<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة دخول الحاوي 🎮</title>
    <style>
        body { 
            margin: 0; padding: 0;
            background-color: #3e2723; 
            background-image: radial-gradient(#5d4037 1px, transparent 1px); 
            background-size: 20px 20px;
            display: flex; justify-content: center; align-items: center; height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        .floating-buttons {
            position: absolute; width: 100%; height: 100%;
            z-index: 0; opacity: 0.15; pointer-events: none;
        }
        .btn-shape { position: absolute; font-size: 60px; user-select: none; }
        
        @keyframes floatUp { 
            0% { transform: translateY(0) rotate(0deg); } 
            50% { transform: translateY(-30px) rotate(45deg); } 
            100% { transform: translateY(0) rotate(0deg); } 
        }
        @keyframes floatDown { 
            0% { transform: translateY(0) rotate(0deg); } 
            50% { transform: translateY(30px) rotate(-45deg); } 
            100% { transform: translateY(0) rotate(0deg); } 
        }

        .login-card { 
            background: #fffaf0; 
            padding: 40px; border-radius: 20px; width: 340px; 
            text-align: center; z-index: 1;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border: 2px solid #8d6e63;
        }

        h2 { color: #3e2723; margin: 0 0 25px 0; font-size: 26px; font-weight: bold; }
        label { display: block; text-align: right; font-weight: bold; font-size: 14px; color: #5d4037; margin-bottom: 5px; }
        
        input[type="email"], input[type="password"] { 
            width: 100%; padding: 12px 15px; margin-bottom: 20px; 
            border: 2px solid #bcaaa4; border-radius: 10px; 
            background: #fff; box-sizing: border-box; font-size: 15px;
            color: #3e2723; transition: all 0.3s;
        }
        input:focus { outline: none; border-color: #d84315; box-shadow: 0 0 8px rgba(216, 67, 21, 0.2); }
        
        .remember-me-container {
            display: flex; align-items: center; gap: 8px;
            text-align: right; margin-bottom: 20px; color: #5d4037;
            font-size: 14px; font-weight: bold; cursor: pointer;
        }
        .remember-me-container input { cursor: pointer; width: 16px; height: 16px; margin: 0; }

        button { 
            width: 100%; padding: 14px; background: #d84315; color: white; 
            border: none; border-radius: 10px; cursor: pointer; font-size: 17px; font-weight: bold;
            box-shadow: 0 4px 10px rgba(216, 67, 21, 0.3); transition: 0.3s;
        }
        button:hover { background: #bf360c; transform: scale(1.02); box-shadow: 0 6px 15px rgba(216, 67, 21, 0.4); }
        button:disabled { background: #999; cursor: not-allowed; }

        .error-msg { color: #d84315; font-size: 13px; margin-top: 10px; display: none; }
        .success-msg { color: #4caf50; font-size: 13px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="floating-buttons">
        <div class="btn-shape" style="top: 15%; left: 12%; animation: floatUp 6s infinite ease-in-out;">🔺</div>
        <div class="btn-shape" style="top: 22%; right: 15%; animation: floatDown 7s infinite ease-in-out;">⭕</div>
        <div class="btn-shape" style="bottom: 18%; left: 18%; animation: floatDown 5.5s infinite ease-in-out;">❌</div>
        <div class="btn-shape" style="bottom: 25%; right: 12%; animation: floatUp 6.5s infinite ease-in-out;">🟦</div>
    </div>

    <div class="login-card">
        <h2>تسجيل الدخول للسيستم 🎮</h2>
        
        <label>البريد الإلكتروني:</label>
        <input type="email" id="email" placeholder="أدخل البريد الإلكتروني ">
        
        <label>كلمة السر:</label>
        <input type="password" id="password" placeholder="••••••••">
        
        <label class="remember-me-container">
            <input type="checkbox" id="remember-email">
            <span>تذكر البريد الإلكتروني  💾</span>
        </label>
        
        <button id="loginBtn" onclick="login()">دخول إلى الحاوي ⏹️</button>
        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>
    </div>

      <script type="module">
        // 1. استدعاء الدوال من الفايربيز مع إضافة getDoc و doc الناقصين لحل المشكلة نهائياً
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD4viBlsx5jHmtpjfKyhDBJCJNLRM-Uduk",
            authDomain: "system-el7awe.firebaseapp.com",
            projectId: "system-el7awe",
            storageBucket: "system-el7awe.firebasestorage.app",
            messagingSenderId: "938519562478",
            appId: "1:938519562478:web:da31c7a27df6463c5f8bff"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // تفعيل الأوفلاين
        enableIndexedDbPersistence(db).catch(() => {});

        // جلب الإيميل المحفوظ عند فتح الصفحة
        window.addEventListener('DOMContentLoaded', () => {
            const savedEmail = localStorage.getItem("savedUserEmail");
            if (savedEmail) {
                document.getElementById('email').value = savedEmail;
                document.getElementById('remember-email').checked = true;
            }
        });

        // دالة تسجيل الدخول المحسنة والذكية
        window.login = async () => {
            let email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            if(!email || !password) {
                errorMsg.innerText = "برجاء كتابة البريد الإلكتروني وكلمة السر أولاً!";
                errorMsg.style.display = 'block';
                return;
            }

            // ميزة مريحة: لو العامل كتب الاسم فقط (مثال: hanin)، السيستم يكمل النطاق تلقائياً تسهيلاً للشغل من الموبايل
            if(!email.includes('@')) {
                email = `${email}@el7awe.com`;
            }

            loginBtn.disabled = true;
            loginBtn.innerText = "جاري التحقق...";

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const loggedEmail = userCredential.user.email.toLowerCase();
                
                // حفظ البريد الإلكتروني في localStorage
                localStorage.setItem("loggedUserEmail", loggedEmail);
                
                if (document.getElementById('remember-email').checked) {
                    localStorage.setItem("savedUserEmail", loggedEmail);
                } else {
                    localStorage.removeItem("savedUserEmail");
                }

                // التحقق من دور المستخدم وصلاحياته من Firestore
                const userDoc = await getDoc(doc(db, "users", loggedEmail));
                let userRole = "worker"; 
                
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    userRole = userData.role || "worker";
                    localStorage.setItem("userRole", userRole);
                    localStorage.setItem("userName", userData.name || "موظف");
                    localStorage.setItem("userPermissions", JSON.stringify(userData));
                } else {
                    // إذا كان الحساب هو الأدمن الرئيسي
                    if(loggedEmail === "admin@el7awe.com") {
                        userRole = "admin";
                        localStorage.setItem("userRole", "admin");
                        localStorage.setItem("userName", "المالك");
                    }
                }

                successMsg.innerText = "✓ تم تسجيل الدخول بنجاح!";
                successMsg.style.display = 'block';

                setTimeout(() => {
                    if(userRole === "admin" || loggedEmail === "admin@el7awe.com") {
                        window.location.href = "admin.html";
                    } else {
                        window.location.href = "index.html";
                    }
                }, 1000);

            } catch(e) {
                if (e.code === "auth/wrong-password" || e.code === "auth/user-not-found" || e.code === "auth/invalid-login-credentials") {
                    errorMsg.innerText = "⚠️ خطأ: بيانات الدخول غير صحيحة، أو الحساب غير مسجل!";
                } else {
                    errorMsg.innerText = "⚠️ حدث خطأ: " + e.message;
                }
                errorMsg.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.innerText = "دخول إلى الحاوي ⏹️";
            }
        }
    </script>

</body>
</html>
